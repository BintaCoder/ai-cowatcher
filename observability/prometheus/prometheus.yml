global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: cowatcher-api
    metrics_path: /metrics
    static_configs:
      # API runs on the host via `make api` during local dev.
      - targets: ["host.docker.internal:8000"]

  - job_name: cowatcher-ingest-worker
    static_configs:
      - targets: ["host.docker.internal:9100"]
